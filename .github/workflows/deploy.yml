name: Hexo Deploy
concurrency:
  group: pages
  cancel-in-progress: true
on:
  push:
    branches: [ master ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取完整源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 配置Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 全局安装Hexo
        run: npm install hexo-cli -g
      - name: 安装项目依赖
        run: npm install
      - name: 构建静态页面
        run: hexo clean && hexo generate
      - name: 强制生成.nojekyll
        run: touch public/.nojekyll
      - name: 强制清空gh-pages旧文件再推送
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          force_orphan: true
